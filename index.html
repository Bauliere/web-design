<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contáctanos - 2077 Empresa SA</title>
  </head>
  <body>

    <main>
      <h1>¡Contáctanos!</h1>

      <section>
        <form action="#" method="POST" novalidate>

          <!-- Nombre completo -->
          <div>
            <label for="nombre">Nombre completo</label>
            <div>
              <span aria-hidden="true">&#128100;</span>
              <input
                type="text"
                id="nombre"
                name="nombre"
                placeholder="Ej: Fausto"
                autocomplete="name"
                required
              />
            </div>
          </div>

          <!-- Correo Electrónico -->
          <div>
            <label for="correo">Correo Electrónico</label>
            <div>
              <span aria-hidden="true">&#9993;</span>
              <input
                type="email"
                id="correo"
                name="correo"
                placeholder="Ej: SickStim@gmail.com"
                autocomplete="email"
                required
              />
            </div>
          </div>

          <!-- Teléfono -->
          <div>
            <label for="telefono">Teléfono</label>
            <div>
              <span aria-hidden="true">&#128222;</span>
              <input
                type="tel"
                id="telefono"
                name="telefono"
                placeholder="Ej: 771 198 3750"
                autocomplete="tel"
              />
            </div>
          </div>

          <!-- Asunto -->
          <div>
            <label for="asunto">Asunto</label>
            <div>
              <span aria-hidden="true">&#9999;</span>
              <input
                type="text"
                id="asunto"
                name="asunto"
                placeholder="Motivo de su mensaje"
              />
            </div>
          </div>

          <!-- Mensaje -->
          <div>
            <label for="mensaje">Mensaje</label>
            <textarea
              id="mensaje"
              name="mensaje"
              placeholder="Escriba su mensaje aquí..."
              rows="5"
            ></textarea>
          </div>

          <button type="submit">Enviar</button>

        </form>
      </section>
    </main>

    <footer>
      <small>2077 Empresa SA</small>

      <nav aria-label="Redes sociales">
        <ul>
          <li>
            <a href="#" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
              Instagram
            </a>
          </li>
          <li>
            <a href="#" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
              Facebook
            </a>
          </li>
          <li>
            <a href="#" target="_blank" rel="noopener noreferrer" aria-label="X (Twitter)">
              X
            </a>
          </li>
        </ul>
      </nav>
    </footer>

  </body>
</html>
